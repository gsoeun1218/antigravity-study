<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomieMatch - 룸메이트 매칭 서비스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- 헤더 영역 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🤝</span>
                <h1 class="text-xl font-bold text-blue-600 tracking-tight">RoomieMatch <span class="text-sm font-medium text-gray-500">| 룸메이트 매칭</span></h1>
            </div>
            <nav class="hidden md:flex space-x-6 text-sm font-medium text-gray-600">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 pb-1">성향 매칭</a>
                <a href="#" class="hover:text-blue-600 transition">공동생활 규칙</a>
                <a href="#" class="hover:text-blue-600 transition">커뮤니티</a>
            </nav>
            <div class="text-xs bg-green-100 text-green-800 font-semibold px-2.5 py-1 rounded-full">
                학생 인증 완료 (@*.ac.kr)
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="max-w-6xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900">나와 잘 맞는 룸메이트 찾기</h2>
            <p class="text-sm text-gray-600 mt-1">좌측 설문지에 본인의 생활 패턴을 입력하면, 일치율이 높은 하우스메이트를 실시간으로 추천해 드립니다.</p>
        </div>

        <!-- 2컬럼 레이아웃 (반응형: 모바일은 1열, PC는 2열) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 왼쪽: [모듈 A] 생활 패턴 및 성향 입력 폼 (4열 차지) -->
            <section class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <div class="flex items-center space-x-2 pb-4 mb-6 border-b border-gray-100">
                    <span class="text-lg">📝</span>
                    <h3 class="text-lg font-bold text-gray-900">내 라이프스타일 프로필</h3>
                </div>

                <form id="profileForm" onsubmit="event.preventDefault();">
                    <!-- 수면 패턴 -->
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">🌙 취침 / 기상 시간</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer bg-blue-50 border-blue-500 text-blue-700 select-none">
                                <input type="radio" name="sleep" value="early" class="hidden" checked onchange="updateRadioStyles(this)"> 22시 이전
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="sleep" value="normal" class="hidden" onchange="updateRadioStyles(this)"> 22시 ~ 24시
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="sleep" value="late" class="hidden" onchange="updateRadioStyles(this)"> 24시 이후
                            </label>
                        </div>
                    </div>

                    <!-- 흡연 여부 -->
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">🚬 흡연 여부</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer bg-blue-50 border-blue-500 text-blue-700 select-none">
                                <input type="radio" name="smoke" value="non-smoker" class="hidden" checked onchange="updateRadioStyles(this)"> 비흡연
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="smoke" value="smoker" class="hidden" onchange="updateRadioStyles(this)"> 흡연
                            </label>
                        </div>
                    </div>

                    <!-- 청소 주기 -->
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">🧹 청소 스타일</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer bg-blue-50 border-blue-500 text-blue-700 select-none">
                                <input type="radio" name="clean" value="daily" class="hidden" checked onchange="updateRadioStyles(this)"> 매일 깔끔히
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="clean" value="weekly" class="hidden" onchange="updateRadioStyles(this)"> 주 1~2회
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="clean" value="free" class="hidden" onchange="updateRadioStyles(this)"> 몰아서 한방에
                            </label>
                        </div>
                    </div>

                    <!-- 친목 성향 -->
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">🏠 외부 친구 초대 규칙</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer bg-blue-50 border-blue-500 text-blue-700 select-none">
                                <input type="radio" name="invite" value="never" class="hidden" checked onchange="updateRadioStyles(this)"> 절대 불가
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="invite" value="agree" class="hidden" onchange="updateRadioStyles(this)"> 사전 동의 필수
                            </label>
                            <label class="flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none">
                                <input type="radio" name="invite" value="free" class="hidden" onchange="updateRadioStyles(this)"> 비교적 자유로움
                            </label>
                        </div>
                    </div>

                    <!-- 소음 민감도 -->
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-sm font-semibold text-gray-700">🎧 소음 민감도</label>
                            <span id="noiseLabel" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">낮음 (둔감함)</span>
                        </div>
                        <input type="range" id="noiseSlider" min="1" max="3" value="1" step="1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="updateNoiseLabel(this.value)">
                        <div class="flex justify-between text-[10px] text-gray-400 px-1 mt-1">
                            <span>낮음</span>
                            <span>보통</span>
                            <span>높음</span>
                        </div>
                    </div>

                    <button type="button" onclick="calculateMatching()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200 flex items-center justify-center space-x-2 text-sm">
                        <span>⚡</span>
                        <span>내 성향 실시간 반영하기</span>
                    </button>
                </form>
            </section>

            <!-- 오른쪽: [모듈 B] 룸메이트 탐색 및 매칭 목록 (7열 차지) -->
            <section class="lg:col-span-7 flex flex-col space-y-4">
                
                <!-- 필터 툴바 -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap items-center justify-between gap-3">
                    <span class="text-sm font-bold text-gray-700">🎯 매칭 정렬 및 필터</span>
                    <div class="flex space-x-4">
                        <label class="inline-flex items-center text-xs font-medium text-gray-600 cursor-pointer select-none">
                            <input type="checkbox" id="filterSmoke" onchange="filterAndRender()" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 mr-1.5 h-4 w-4">
                            비흡연자만 보기
                        </label>
                        <label class="inline-flex items-center text-xs font-medium text-gray-600 cursor-pointer select-none">
                            <input type="checkbox" id="filterSleep" onchange="filterAndRender()" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 mr-1.5 h-4 w-4">
                            수면 성향 일치만 보기
                        </label>
                    </div>
                </div>

                <!-- 룸메이트 카드들이 담길 컨테이너 -->
                <div id="roommateContainer" class="space-y-4">
                    <!-- JavaScript에서 동적으로 생성됩니다. -->
                </div>
            </section>
        </div>
    </main>

    <!-- 푸터 영역 -->
    <footer class="bg-white border-t border-gray-200 mt-12 py-6">
        <div class="max-w-6xl mx-auto px-4 text-center text-xs text-gray-400">
            &copy; 2026 RoomieMatch. 대학 SW 프로그래밍의 이해 실습 과제물.
        </div>
    </footer>

    <!-- 비즈니스 로직 및 인터랙션 자바스크립트 -->
    <script>
        // 가상의 룸메이트 데이터 (Mock Data)
        const mockRoommates = [
            {
                name: "김민준",
                emailCertified: true,
                tags: ["#아침형인간", "#깔끔지왕", "#개인주의"],
                preferences: { sleep: "early", smoke: "non-smoker", clean: "daily", invite: "never", noise: 2 }
            },
            {
                name: "이서연",
                emailCertified: true,
                tags: ["#야행성", "#비흡연", "#친구환영"],
                preferences: { sleep: "late", smoke: "non-smoker", clean: "weekly", invite: "free", noise: 1 }
            },
            {
                name: "박지훈",
                emailCertified: true,
                tags: ["#무난함", "#흡연가능", "#수다쟁이"],
                preferences: { sleep: "normal", smoke: "smoker", clean: "weekly", invite: "agree", noise: 3 }
            },
            {
                name: "최수아",
                emailCertified: true,
                tags: ["#얼리버드", "#절대비흡연", "#조용함"],
                preferences: { sleep: "early", smoke: "non-smoker", clean: "daily", invite: "agree", noise: 3 }
            }
        ];

        // 성향 가중치 테이블 (일치율 계산용)
        let currentMatches = [];

        // 라디오 버튼 시각적 토글 함수
        function updateRadioStyles(inputElement) {
            const name = inputElement.name;
            const groupLabels = document.querySelectorAll(`input[name="${name}"]`);
            
            groupLabels.forEach(input => {
                const parent = input.parentElement;
                if (input.checked) {
                    parent.className = "flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer bg-blue-50 border-blue-500 text-blue-700 select-none";
                } else {
                    parent.className = "flex items-center justify-center border rounded-xl p-2 text-xs font-medium cursor-pointer border-gray-200 hover:bg-gray-50 select-none";
                }
            });
        }

        // 소음 민감도 슬라이더 텍스트 변경
        function updateNoiseLabel(val) {
            const label = document.getElementById('noiseLabel');
            if (val == 1) label.innerText = "낮음 (둔감함)";
            else if (val == 2) label.innerText = "보통 (평범)";
            else if (val == 3) label.innerText = "높음 (예민함)";
        }

        // 현재 선택된 사용자의 폼 값 가져오기
        function getUserPreferences() {
            return {
                sleep: document.querySelector('input[name="sleep"]:checked').value,
                smoke: document.querySelector('input[name="smoke"]:checked').value,
                clean: document.querySelector('input[name="clean"]:checked').value,
                invite: document.querySelector('input[name="invite"]:checked').value,
                noise: parseInt(document.getElementById('noiseSlider').value)
            };
        }

        // 일치율(%) 계산 메인 로직
        function calculateMatching() {
            const user = getUserPreferences();

            currentMatches = mockRoommates.map(roommate => {
                let score = 0;
                let totalCriteria = 5;

                if (user.sleep === roommate.preferences.sleep) score += 1;
                if (user.smoke === roommate.preferences.smoke) score += 1;
                if (user.clean === roommate.preferences.clean) score += 1;
                if (user.invite === roommate.preferences.invite) score += 1;
                // 소음 민감도는 거리가 1 이하일 때 점수 인정
                if (Math.abs(user.noise - roommate.preferences.noise) <= 1) score += 1;

                const matchPercent = Math.round((score / totalCriteria) * 100);
                return { ...roommate, matchPercent };
            });

            // 매칭 점수가 높은 순으로 정렬
            currentMatches.sort((a, b) => b.matchPercent - a.matchPercent);

            filterAndRender();
        }

        // 필터링 처리 및 화면 렌더링
        function filterAndRender() {
            const showOnlyNonSmoker = document.getElementById('filterSmoke').checked;
            const showOnlySleepMatch = document.getElementById('filterSleep').checked;
            const user = getUserPreferences();

            const container = document.getElementById('roommateContainer');
            container.innerHTML = '';

            let filtered = [...currentMatches];

            if (showOnlyNonSmoker) {
                filtered = filtered.filter(r => r.preferences.smoke === 'non-smoker');
            }
            if (showOnlySleepMatch) {
                filtered = filtered.filter(r => r.preferences.sleep === user.sleep);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-xl text-center border border-gray-100 text-gray-500 text-sm">
                        🔍 필터 조건에 맞는 룸메이트가 없습니다. 조건을 완화해 보세요.
                    </div>
                `;
                return;
            }

            filtered.forEach(person => {
                // 일치율 컬러바 설정
                let colorClass = "bg-blue-600";
                let textClass = "text-blue-600";
                let bgBadge = "bg-blue-50";
                if (person.matchPercent < 50) {
                    colorClass = "bg-gray-400";
                    textClass = "text-gray-500";
                    bgBadge = "bg-gray-100";
                } else if (person.matchPercent < 80) {
                    colorClass = "bg-indigo-500";
                    textClass = "text-indigo-600";
                    bgBadge = "bg-indigo-50";
                }

                const cardHtml = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-4 transition hover:shadow-md">
                        <div class="flex items-start space-x-4">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-blue-400 to-indigo-500 flex items-center justify-center text-white font-bold text-lg shadow-sm">
                                ${person.name[0]}
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <h4 class="font-bold text-gray-900">${person.name}</h4>
                                    ${person.emailCertified ? '<span class="text-[10px] bg-blue-100 text-blue-700 font-semibold px-1.5 py-0.5 rounded">@*.ac.kr 인증 완료</span>' : ''}
                                </div>
                                <div class="flex space-x-1.5 mt-2">
                                    ${person.tags.map(tag => `<span class="text-[11px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-md">${tag}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- 일치율 게이지 및 액션 버튼 -->
                        <div class="flex items-center justify-between md:justify-end gap-6 border-t md:border-t-0 pt-3 md:pt-0 border-gray-50">
                            <div class="text-right min-w-[100px]">
                                <span class="text-xs text-gray-400 font-medium">성향 일치율</span>
                                <div class="text-lg font-black ${textClass}">${person.matchPercent}%</div>
                                <div class="w-24 bg-gray-200 rounded-full h-1.5 mt-1 overflow-hidden ml-auto">
                                    <div class="${colorClass} h-1.5 rounded-full" style="width: ${person.matchPercent}%"></div>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="alert('${person.name}님의 상세 성향 프로필 열람 (Static Mockup)')" class="px-3 py-2 text-xs font-semibold text-gray-600 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-lg transition">
                                    상세보기
                                </button>
                                <button onclick="alert('${person.name}님에게 룸메이트 매칭 신청이 정상적으로 발송되었습니다!')" class="px-3 py-2 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition">
                                    매칭 신청
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 페이지 최초 로드 시 기본 매칭 계산 실행
        window.onload = function() {
            calculateMatching();
        };
    </script>
</body>
</html>
